[tox]
skipsdist=True
skip_missing_interpreters = True
envlist = lint, unit

[vars]
tst_path = {toxinidir}/tests/

[testenv]
allowlist_externals =
  tox
  uvx
  cp
basepython = python3
setenv =
  PYTHONPATH = {toxinidir}
  PYTHONBREAKPOINT=pdb.set_trace
  PY_COLORS=1
passenv =
  PYTHONPATH
  CI
  WORKER_CHARM_PATH
  COORDINATOR_CHARM_PATH
  WORKER_CHARM_CHANNEL
  COORDINATOR_CHARM_CHANNEL
  KEEP_MODELS

[testenv:lock]
description = Update uv.lock with the latest deps
commands =
    tox -c coordinator/tox.ini --root coordinator -e lock
    tox -c worker/tox.ini --root worker -e lock

[testenv:lint]
description = Lint all components
commands =
    tox -c coordinator/tox.ini --root coordinator -e lint
    tox -c worker/tox.ini --root worker -e lint

[testenv:static]
description = Run static checks for all components
commands =
    tox -c coordinator/tox.ini --root coordinator -e static
    tox -c worker/tox.ini --root worker -e static

[testenv:fmt]
description = Format the code for all components
commands =
    tox -c coordinator/tox.ini --root coordinator -e fmt
    tox -c worker/tox.ini --root worker -e fmt

[testenv:unit]
description = Run unit tests for all components
commands =
    tox -c coordinator/tox.ini --root coordinator -e unit
    tox -c worker/tox.ini --root worker -e unit

    cp coordinator/.coverage {toxinidir}/.coverage.coordinator
    cp worker/.coverage {toxinidir}/.coverage.worker

    uvx coverage combine
    uvx coverage report

[testenv:integration]
description = Run integration tests
commands =
    tox -c coordinator/tox.ini --root coordinator -e integration {posargs}
