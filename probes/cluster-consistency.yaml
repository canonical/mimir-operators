name: Mimir - coordinated-workers deployment validator
probes:
  - name: Cluster consistency
    type: scriptlet
    url: github://canonical/cos-coordinated-workers//probes/cluster_consistency.py
    with:
      - worker_charm: mimir-worker-k8s
        recommended_deployment:
          read: 3
          write: 3
          backend: 3
        meta_roles:
          all: [read, write, backend]
